const lista = document.getElementById("lista");

function atualizar() {
    const total = numeros.length;
    const ligados = document.querySelectorAll(".ligado").length;

    totalEl.textContent = total;
    ligadosEl.textContent = ligados;
    faltamEl.textContent = total - ligados;
}

numeros.forEach(numero => {

    const div = document.createElement("div");
    div.className = "item";

    const link = document.createElement("a");
    link.href = "tel:" + numero;
    link.textContent = numero;
    link.className = "numero";

    if(localStorage.getItem("ligado_" + numero)){
        link.classList.add("ligado");
    }

    const btn = document.createElement("button");
    btn.textContent = "✓ Ligado";

    btn.onclick = () => {

        if(link.classList.contains("ligado")){
            link.classList.remove("ligado");
            localStorage.removeItem("ligado_" + numero);
        }else{
            link.classList.add("ligado");
            localStorage.setItem("ligado_" + numero, "1");
        }

        atualizar();
    };

    div.appendChild(link);
    div.appendChild(btn);

    lista.appendChild(div);
});

const totalEl = document.getElementById("total");
const ligadosEl = document.getElementById("ligados");
const faltamEl = document.getElementById("faltam");

atualizar();
